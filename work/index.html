<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Work — Su</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/work-list.css" />
  </head>
  <body class="works-page">
    <header class="nav">
      <div class="nav__logo title-en">
        <a class="nav__link" href="../Index.html">su</a><a class="nav__link" href="https://www.instagram.com/suhyun.youn" target="_blank" rel="noopener noreferrer">u</a><span class="nav__text">uuu</span><span class="nav__text" aria-hidden="true">u</span>
      </div>
      <a class="nav__link title-en is-active" href="./">work</a>
      <a class="nav__link title-en" href="../about/">about</a>
      <button class="nav__lang title-en" type="button">en</button>
    </header>

    <main class="works">
      <div class="works__bar">
        <div class="works__filters-outer">
          <div class="works__filters" id="filters">
          <button type="button" class="filter is-active" data-cat="all">all</button>
          <span>/</span>
          <button type="button" class="filter" data-cat="books">books</button>
          <span>/</span>
          <button type="button" class="filter" data-cat="print">print</button>
          <span>/</span>
          <button type="button" class="filter" data-cat="installation">installation</button>
          <span>/</span>
          <button type="button" class="filter" data-cat="other">other</button>
          </div>
        </div>
        <div class="works__views-outer">
          <div class="works__views" id="views">
          <button type="button" class="view is-active" data-view="grid">grid</button>
          <span>/</span>
          <button type="button" class="view" data-view="list">list</button>
          </div>
        </div>
      </div>

      <!-- 그리드 뷰 -->
      <div class="works__grid" id="grid"></div>

      <!-- 리스트 뷰 -->
      <div class="works__list" id="list"></div>
    </main>

    <!-- 리스트 호버 시 따라다니는 썸네일 -->
    <img class="works__preview" id="preview" alt="" />

    <script src="../js/lang.js"></script>
    <script src="../js/font-system.js"></script>
    <script src="../js/works-loader.js"></script>
    <script src="../js/works.js"></script>
  </body>
</html>
