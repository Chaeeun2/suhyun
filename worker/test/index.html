<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>R2 이미지 업로드 / 미리보기 / 삭제 테스트</title>
  <style>
    :root { --line: #e5e5e7; --accent: #2563eb; --danger: #ef4444; --bg: #f7f7f8; --muted: #888; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: #111; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 32px 20px 80px; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    p.desc { color: #666; margin: 0 0 24px; font-size: 14px; }
    .card { background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .card h2 { font-size: 16px; margin: 0 0 14px; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 0 0 6px; }
    input[type="text"], input[type="file"] { width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 14px; background: #fff; }
    button { padding: 10px 18px; border: 0; border-radius: 8px; background: var(--accent); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: .5; cursor: default; }
    button.danger { background: var(--danger); }
    button.ghost { background: #f0f0f2; color: #333; }
    .muted { color: var(--muted); font-size: 12px; margin: 8px 0 0; }
    .status { margin-top: 12px; font-size: 13px; min-height: 18px; }
    .status.err { color: var(--danger); }
    .status.ok { color: #16a34a; }

    /* 갤러리 */
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 10px; flex-wrap: wrap; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
    .item { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; background: #fff; display: flex; flex-direction: column; }
    .thumb { aspect-ratio: 1 / 1; background: #fafafa center/cover no-repeat; display: flex; align-items: center; justify-content: center; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb .file-badge { font-size: 12px; color: var(--muted); }
    .meta { padding: 10px 12px; font-size: 12px; color: #444; flex: 1; }
    .meta .key { word-break: break-all; color: #666; }
    .meta .sz { color: var(--muted); margin-top: 4px; }
    .item .actions { padding: 0 12px 12px; display: flex; gap: 8px; }
    .item .actions button { flex: 1; padding: 8px; font-size: 13px; }
    .empty { color: var(--muted); font-size: 14px; text-align: center; padding: 30px 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>R2 이미지 업로드 / 미리보기 / 삭제</h1>
    <p class="desc">Cloudflare Worker(<code>suhyun-worker</code>) + R2(<code>suhyun-assets</code>) 테스트 페이지</p>

    <!-- 설정 -->
    <div class="card">
      <label for="base">Worker 주소 (Base URL)</label>
      <input type="text" id="base" placeholder="http://localhost:8787" />
      <p class="muted">이 페이지를 Worker가 직접 서빙하면 현재 주소가 자동으로 채워집니다.</p>
    </div>

    <!-- 업로드 -->
    <div class="card">
      <h2>업로드</h2>
      <input type="file" id="file" accept="image/*" multiple />
      <p class="muted">이미지 여러 장을 한 번에 선택할 수 있습니다.</p>
      <div style="margin-top:14px;">
        <button id="uploadBtn">업로드</button>
      </div>
      <div class="status" id="uploadStatus"></div>
    </div>

    <!-- 갤러리 -->
    <div class="card">
      <div class="toolbar">
        <h2 style="margin:0;">업로드된 이미지 <span id="count" class="muted"></span></h2>
        <button class="ghost" id="clearBtn">목록 비우기</button>
      </div>
      <div class="grid" id="grid"></div>
      <div class="empty" id="empty">아직 업로드된 이미지가 없습니다.</div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const STORAGE_KEY = "r2-test-items";

    // 기본 Base URL
    $("base").value = location.origin.startsWith("http") ? location.origin : "http://localhost:8787";
    const baseUrl = () => $("base").value.trim().replace(/\/+$/, "");

    // 업로드된 항목 목록 (localStorage 유지)
    let items = loadItems();
    render();

    function loadItems() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }
    function saveItems() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function setStatus(el, msg, kind) {
      el.className = "status" + (kind ? " " + kind : "");
      el.textContent = msg;
    }

    function fmtSize(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / (1024 * 1024)).toFixed(2) + " MB";
    }

    // 업로드 (여러 장)
    $("uploadBtn").addEventListener("click", async () => {
      const files = $("file").files;
      if (!files || !files.length) {
        setStatus($("uploadStatus"), "파일을 선택해 주세요.", "err");
        return;
      }
      $("uploadBtn").disabled = true;
      let ok = 0, fail = 0;
      for (let i = 0; i < files.length; i++) {
        setStatus($("uploadStatus"), `업로드 중... (${i + 1}/${files.length})`, "");
        try {
          const fd = new FormData();
          fd.append("file", files[i]);
          const res = await fetch(baseUrl() + "/upload", { method: "POST", body: fd });
          const data = await res.json();
          if (res.ok && data.objectKey) {
            items.unshift({ url: data.url, objectKey: data.objectKey, type: data.type, size: data.size });
            ok++;
          } else {
            fail++;
            console.warn("업로드 실패:", data);
          }
        } catch (e) {
          fail++;
          console.warn("업로드 요청 실패:", e);
        }
      }
      saveItems();
      render();
      $("file").value = "";
      $("uploadBtn").disabled = false;
      setStatus(
        $("uploadStatus"),
        `완료: 성공 ${ok}개` + (fail ? `, 실패 ${fail}개 (콘솔 확인)` : ""),
        fail ? "err" : "ok",
      );
    });

    // 삭제 (objectKey 기반)
    async function deleteItem(objectKey, btn) {
      btn.disabled = true;
      btn.textContent = "삭제 중...";
      try {
        const res = await fetch(baseUrl() + "/delete", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ objectKey }),
        });
        const data = await res.json();
        if (res.ok && data.ok) {
          items = items.filter((it) => it.objectKey !== objectKey);
          saveItems();
          render();
        } else {
          alert("삭제 실패: " + JSON.stringify(data));
          btn.disabled = false;
          btn.textContent = "삭제";
        }
      } catch (e) {
        alert("삭제 요청 실패: " + e);
        btn.disabled = false;
        btn.textContent = "삭제";
      }
    }

    // 목록 비우기 (로컬 목록만 삭제 - R2 파일은 그대로)
    $("clearBtn").addEventListener("click", () => {
      if (!items.length) return;
      if (confirm("화면 목록만 비웁니다. (R2의 실제 파일은 삭제되지 않습니다) 계속할까요?")) {
        items = [];
        saveItems();
        render();
      }
    });

    // 렌더링
    function render() {
      const grid = $("grid");
      grid.innerHTML = "";
      $("count").textContent = items.length ? `(${items.length})` : "";
      $("empty").style.display = items.length ? "none" : "block";

      for (const it of items) {
        const isImage = (it.type || "").startsWith("image/");
        const el = document.createElement("div");
        el.className = "item";
        el.innerHTML = `
          <div class="thumb">
            ${isImage
              ? `<img src="${it.url}" alt="preview" loading="lazy" />`
              : `<span class="file-badge">${it.type || "file"}</span>`}
          </div>
          <div class="meta">
            <div class="key">${it.objectKey}</div>
            <div class="sz">${it.type || ""} · ${fmtSize(it.size || 0)}</div>
          </div>
          <div class="actions">
            <button class="ghost open">열기</button>
            <button class="danger del">삭제</button>
          </div>
        `;
        el.querySelector(".open").addEventListener("click", () => window.open(it.url, "_blank"));
        el.querySelector(".del").addEventListener("click", (e) => deleteItem(it.objectKey, e.target));
        grid.appendChild(el);
      }
    }
  </script>
</body>
</html>
